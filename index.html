<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <!-- Define a codificação de caracteres (acentos e símbolos) -->
    <meta charset="UTF-8">

    <!-- Faz o site se adaptar corretamente ao tamanho da tela (responsividade) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>QuizTech</title>

    <!-- Arquivo de estilos do projeto -->
    <link rel="stylesheet" href="style.css">

    <!-- Biblioteca de ícones Material Symbols (Google) -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />

    <!-- Biblioteca Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

    <!-- Botão para alternar entre modo claro e escuro -->
    <button id="temaBtn">
        <i class="bi bi-moon-fill"></i>
    </button>

    <div class="container">

        <!-- Tela inicial -->
        <div id="inicio">

            <!-- Ícone utilizando Material Symbols -->
            <div class="icone">
                <span class="material-symbols-rounded">
                    psychology
                </span>
            </div>

            <h1>Quiz de Programação</h1>

            <p>
                Teste seus conhecimentos respondendo <br>
                às perguntas.
            </p>

            <button id="btnIniciar">
                Iniciar
            </button>

        </div>

        <!-- Tela do quiz (começa escondida) -->
        <div id="quiz" style="display: none;">

            <!-- Div usada para aplicar animação entre as perguntas -->
            <div id="conteudoQuiz">

                <!-- Pergunta inserida dinamicamente pelo JavaScript -->
                <h2 id="pergunta"></h2>

                <!-- As alternativas são criadas via JavaScript -->
                <div id="respostas"></div>

                <!-- Botão exibido somente após responder -->
                <button id="proxima" style="display: none;">
                    Próxima
                </button>

            </div>

        </div>

        <!-- Tela final (fica escondida até terminar o quiz) -->
        <div id="resultado" style="display: none;">

            <h2>Quiz Finalizado!</h2>

            <!-- Pontuação preenchida pelo JavaScript -->
            <p id="pontuacao"></p>

            <!-- Recarrega a página para reiniciar o quiz -->
            <button id="jogarnovamente" onclick="location.reload()">
                Jogar Novamente
            </button>

        </div>

    </div>

    <!-- Arquivo JavaScript do projeto -->
    <script src="script.js"></script>

</body>

</html>
